name: 功能建议
description: 提交一个新功能或改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出改进建议。请尽量说明场景、目标和可接受的实现方式。

  - type: textarea
    id: problem
    attributes:
      label: 你的问题或痛点
      description: 现在遇到了什么问题？
      placeholder: 描述当前流程中的不便之处
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 希望新增或改成什么样？
      placeholder: 描述你理想中的交互或功能行为
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: 预期收益
      description: 这个改动会带来什么价值？
      placeholder: 例如提效、稳定性提升、降低学习成本等

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 工作台
        - 任务管理
        - 模型管理
        - 导入导出
        - 打包发布/工程化
        - 其他

  - type: textarea
    id: alternatives
    attributes:
      label: 可选方案
      description: 是否考虑过其他替代方案？
      placeholder: 可选，不填也可以

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 截图、参考链接、原型草图等
