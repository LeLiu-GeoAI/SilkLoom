llm:
  api_key: xxxx
  base_url: https://open.bigmodel.cn/api/paas/v4/chat/completions
  model: glm-4v-flash
  max_tokens: 1024
  temperature: 0.7
  max_try: 3
  timeout: 60
  retry_delay: 2
  proxy_url: ''
  enable_think: false
run:
  max_workers: 5
  shuffle_before_run: false
task:
  task_name: 图像理解示例
  image_path_field: image_path
  prompt_template: |-
    你是一个图文信息抽取助手。
    请结合【任务描述】与【图片】输出 JSON。

    【要求】
    1. 仅输出 JSON，不要输出其他解释。
    2. 若无法判断，请在对应字段写“未明确”。

    【任务描述】
    {{ row.get('场景描述') }}

    【输出格式】
    {{ schema }}
  target_schema:
    主色判断: 用一个颜色词描述画面主色
    画面描述: 用一句话描述画面内容
    是否纯色块: 是/否
